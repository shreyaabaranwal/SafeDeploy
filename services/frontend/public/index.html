<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SafeDeploy Dashboard</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="container">

    <header>
      <h1>🚀 SafeDeploy</h1>
      <p>AWS Cloud Club KIET | CI/CD Monitoring Dashboard</p>
    </header>

    <section class="card">
      <h2>Service Health</h2>
      <button onclick="checkHealth()">Check Health</button>
      <p id="healthOutput" class="output"></p>
    </section>

    <section class="card">
      <h2>Message API</h2>
      <button onclick="getMessage()">Get Message</button>
      <p id="messageOutput" class="output"></p>
    </section>

    <section class="card">
      <h2>Custom API Call</h2>
      <input type="text" id="endpoint" placeholder="/todos or /users" />
      <button onclick="callCustomAPI()">Call API</button>
      <pre id="customOutput"></pre>
    </section>

  </div>

  <script src="app.js"></script>
</body>
</html>
